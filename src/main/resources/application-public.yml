apis:
  weather:
    baseUrl: ${WEATHER_API_BASE_URL:https://api.open-meteo.com/v1}
    timeout: 5000
  route:
    baseUrl: ${ROUTE_API_BASE_URL:http://router.project-osrm.org/route/v1}
    timeout: 5000
  geoconverter:
    baseUrl: ${GEOCONVERTER_BASE_URL:https://geocode.maps.co/}
    apiKey: ${GEOCONVERTER_API_KEY}
    timeout: 5000
spring:
  application:
    name: Hamburger Weather — Bike Route & Safety Forecast
  flyway:
    url: ${SPRING_FLYWAY_URL:jdbc:postgresql://localhost:5432/hamburger-weather}
    user: ${SPRING_FLYWAY_USER}
    password: ${SPRING_FLYWAY_PASSWORD}
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/hamburger-weather}
    username: ${SPRING_R2DBC_USERNAME}
    password: ${SPRING_R2DBC_PASSWORD}
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/hamburger-weather}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
logging:
  level:
    org.springframework.r2dbc: DEBUG
    io.r2dbc.postgresql: DEBUG
    org.springframework.data.r2dbc: DEBUG
    root: INFO
server:
  error:
    include-stacktrace: always
    include-message: always
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    display-request-duration: true
    try-it-out-enabled: true
management:
  endpoints:
    web:
      exposure:
        include: health